version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: meuplantao-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 8643
      POSTGRES_DB: MeuPlantaoDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meuplantao-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: meuplantao-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8082
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=MeuPlantaoDB;Username=postgres;Password=8643
      Jwt__Key: X7k#mP9$qR2@nL5&wJ8!vD4^hF6*yA3z
      Jwt__Issuer: MeuPlantao
      Jwt__Audience: MeuPlantaoUsers
      Jwt__ExpiresInHours: 8
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./MeuPlantao:/app/source
    networks:
      - meuplantao-network
    restart: unless-stopped

# Volumes
volumes:
  postgres_data:
    driver: local

# Networks
networks:
  meuplantao-network:
    driver: bridge
